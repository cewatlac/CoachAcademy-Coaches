<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omar & Ghada — Engagement</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f5f0e8;
    --dark: #1a1410;
    --sepia: #3d2b1f;
    --red: #8b1a1a;
    --gold: #c9a84c;
  }
  html, body { width: 100%; min-height: 100vh; overflow-x: hidden; background: #000; }
  
  /* GRAIN */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 1000; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.3;
  }

  /* PETAL CANVAS */
  #petals { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* HERO BACKGROUND - Photo B&W */
  .hero-bg {
    position: fixed; inset: 0; z-index: 1;
    background-image: var(--photo-bg);
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    filter: brightness(0.75);
  }
  .hero-overlay {
    position: fixed; inset: 0; z-index: 2;
    background: linear-gradient(
      to bottom,
      rgba(10,6,3,0.05) 0%,
      rgba(10,6,3,0.05) 40%,
      rgba(10,6,3,0.35) 80%,
      rgba(10,6,3,0.55) 100%
    );
  }

  /* PULSE RINGS */
  .pulse-ring {
    position: fixed; width: 340px; height: 340px;
    border: 1px solid rgba(139,26,26,0.1);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    animation: pulse 4.5s ease-out infinite;
    pointer-events: none; z-index: 3;
  }
  .pulse-ring:nth-child(2) { animation-delay: 1.5s; }
  .pulse-ring:nth-child(3) { animation-delay: 3s; }

  /* PAGE */
  .page {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 36px 16px 60px;
  }

  /* NAMES */
  .names-wrap {
    text-align: center;
    margin-bottom: 6px;
    opacity: 0; animation: fadeDown 1.4s ease 0.4s forwards;
  }
  .name-script {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(90px, 20vw, 150px);
    line-height: 1;
    display: block;
    text-shadow: 2px 4px 20px rgba(0,0,0,0.7);
    letter-spacing: 2px;
  }
  .name-script.red { color: var(--red); animation: float 6s ease-in-out 2s infinite; }
  .name-script.cream { color: var(--cream); animation: float 6s ease-in-out 2.6s infinite; }
  .and-word {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(40px, 9vw, 65px);
    color: var(--red);
    display: block;
    margin: -16px 0;
    text-shadow: 0 0 20px rgba(139,26,26,0.5);
  }

  /* DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 12px;
    width: min(380px, 88%);
    margin: 20px auto;
    opacity: 0; animation: fadeUp 1.2s ease 1s forwards;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .divider-diamond {
    width: 7px; height: 7px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 10px rgba(201,168,76,0.6);
  }

  /* LACE CARD */
  .lace-card {
    position: relative;
    width: min(520px, 95%);
    opacity: 0; animation: fadeUp 1.4s ease 1.2s forwards;
  }
  .lace-corner {
    position: absolute; width: 40px; height: 40px;
    border-color: rgba(245,240,232,0.4); border-style: solid;
  }
  .lace-corner.tl { top: -18px; left: -18px; border-width: 2px 0 0 2px; }
  .lace-corner.tr { top: -18px; right: -18px; border-width: 2px 2px 0 0; }
  .lace-corner.bl { bottom: -18px; left: -18px; border-width: 0 0 2px 2px; }
  .lace-corner.br { bottom: -18px; right: -18px; border-width: 0 2px 2px 0; }

  /* DENTAL/LACE PATTERN BORDER */
  .dental-top, .dental-bot {
    width: 100%;
    height: 14px;
    display: block;
    position: relative;
    overflow: hidden;
  }
  .dental-top svg, .dental-bot svg { width: 100%; height: 100%; }

  .card-inner {
    background: rgba(18, 11, 7, 0.72);
    border: 1px solid rgba(201,168,76,0.2);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    padding: 26px 38px 30px;
    text-align: center;
    position: relative;
  }
  .card-inner::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06), transparent 60%);
    pointer-events: none;
  }

  /* VENUE */
  .venue {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(14px, 3.5vw, 17px);
    color: var(--cream);
    opacity: 0.72;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 2;
    margin: 8px 0 16px;
  }
  .venue a {
    color: var(--gold);
    text-decoration: none;
    opacity: 0.85;
    letter-spacing: 2px;
    font-size: clamp(10px, 2.5vw, 11px);
    display: block;
    margin-top: 4px;
  }
  .venue a:hover { opacity: 1; text-decoration: underline; }

  /* DATE */
  .date-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(16px, 4vw, 20px);
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.85;
    margin-bottom: 8px;
  }
  .date-year-top {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(18px, 4.5vw, 24px);
    color: var(--gold);
    letter-spacing: 8px;
    font-weight: 400;
    opacity: 0.75;
    margin-bottom: 2px;
    text-transform: uppercase;
  }
  .date-big {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(42px, 11vw, 64px);
    color: var(--cream);
    letter-spacing: 10px;
    font-weight: 700;
    text-shadow: 0 0 30px rgba(245,240,232,0.15);
    line-height: 1.25;
  }
  .date-year {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(20px, 5.5vw, 30px);
    color: var(--cream);
    letter-spacing: 10px;
    font-weight: 700;
    opacity: 0.7;
    margin-bottom: 14px;
  }

  /* TIME + COUNTDOWN — SAME LINE */
  .time-countdown-row {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin: 6px 0 18px;
  }
  .time-badge {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(16px, 4.2vw, 22px);
    color: var(--cream);
    opacity: 0.75;
    letter-spacing: 4px;
    white-space: nowrap;
  }
  .sep-pipe {
    color: var(--red);
    opacity: 0.6;
    font-size: 18px;
    font-weight: 300;
  }
  .countdown-inline {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .cd-unit-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .cd-num-sm {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(20px, 5.5vw, 28px);
    font-weight: 700;
    color: var(--cream);
    background: rgba(139,26,26,0.2);
    border: 1px solid rgba(139,26,26,0.3);
    padding: 2px 8px;
    min-width: 38px;
    text-align: center;
    animation: cdFlip 0.4s ease;
  }
  .cd-lbl-sm {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.65;
    margin-top: 3px;
  }
  .cd-colon {
    font-family: 'Courier Prime', monospace;
    font-size: 20px;
    color: var(--red);
    opacity: 0.5;
    margin-bottom: 10px;
    animation: blink 1s step-end infinite;
  }

  /* TAGLINE */
  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(14px, 3.5vw, 17px);
    color: var(--cream);
    opacity: 0.5;
    line-height: 1.9;
    border-top: 1px solid rgba(245,240,232,0.1);
    padding-top: 16px;
    margin-top: 2px;
  }
  .tagline strong { color: var(--gold); font-style: normal; font-weight: 700; }

  /* BOTTOM QUOTE */
  .bottom-quote {
    max-width: 480px;
    text-align: center;
    margin-top: 38px;
    opacity: 0; animation: fadeUp 1.4s ease 2s forwards;
    padding: 0 8px;
  }
  .bottom-quote p {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(11px, 2.8vw, 14px);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.35;
    line-height: 2.2;
  }
  .bottom-quote strong { color: var(--cream); font-weight: 700; }

  /* KEYFRAMES */
  @keyframes fadeDown { from{opacity:0;transform:translateY(-28px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(28px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes pulse    { 0%{transform:translate(-50%,-50%) scale(0);opacity:0.5} 100%{transform:translate(-50%,-50%) scale(4.5);opacity:0} }
  @keyframes float    { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-10px) rotate(2deg)} }
  @keyframes blink    { 0%,100%{opacity:0.5} 50%{opacity:0} }
  @keyframes cdFlip   { 0%{transform:rotateX(-90deg);opacity:0} 100%{transform:rotateX(0);opacity:1} }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .page { padding: 24px 10px 48px; }
    .card-inner { padding: 18px 16px 22px; }
    .lace-card { width: 96%; }
    .time-countdown-row { gap: 5px; flex-direction: column; }
    .time-badge { font-size: 14px; letter-spacing: 2px; }
    .cd-num-sm { min-width: 32px; font-size: 18px; padding: 2px 6px; }
    .cd-lbl-sm { font-size: 8px; }
    .venue { font-size: 12px; letter-spacing: 2px; }
    .cd-colon { font-size: 18px; }
    .sep-pipe { display: none; }
  }
  @media (max-width: 380px) {
    .time-badge { font-size: 12px; }
    .cd-num-sm { font-size: 16px; min-width: 28px; }
  }
  /* ── TABLET ── */
  @media (min-width: 481px) and (max-width: 900px) {
    .lace-card { width: min(500px, 90%); }
    .card-inner { padding: 22px 34px 26px; }
  }
  /* ── LAPTOP / DESKTOP ── */
  @media (min-width: 901px) {
    .lace-card { width: 540px; }
    .card-inner { padding: 30px 50px 34px; }
    .page { padding: 52px 24px 80px; }
  }
</style>
</head>

<!-- BG Photo (set by JS) -->
<div class="hero-bg" id="heroBg"></div>
<div class="hero-overlay"></div>

<div class="pulse-ring"></div>
<div class="pulse-ring"></div>
<div class="pulse-ring"></div>
<canvas id="petals"></canvas>

<div class="page">

  <!-- NAMES -->
  <div class="names-wrap">
    <span class="name-script red">Omar</span>
    <span class="and-word">&amp;</span>
    <span class="name-script red">Ghada</span>
  </div>

  <!-- DIVIDER -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <!-- CARD -->
  <div class="lace-card">
    <div class="lace-corner tl"></div>
    <div class="lace-corner tr"></div>
    <div class="lace-corner bl"></div>
    <div class="lace-corner br"></div>

    <!-- DENTAL TOP -->
    <div class="dental-top">
      <svg viewBox="0 0 440 14" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>

        <rect width="440" height="14" fill="url(#dt)"/>
      </svg>
    </div>

    <div class="card-inner">

        <div class="countdown-inline">

          </div>
          <span class="cd-colon">:</span>
          <div class="cd-unit-wrap">
            <div class="cd-num-sm" id="cd-h">00</div>
            <div class="cd-lbl-sm">Hrs</div>
          </div>
          <span class="cd-colon">:</span>
          <div class="cd-unit-wrap">
            <div class="cd-num-sm" id="cd-m">00</div>
            <div class="cd-lbl-sm">Min</div>
          </div>
          <span class="cd-colon">:</span>
          <div class="cd-unit-wrap">
            <div class="cd-num-sm" id="cd-s">00</div>
            <div class="cd-lbl-sm">Sec</div>
          </div>
        </div>
      </div>

      <!-- DENTAL BOTTOM -->
      <div class="dental-bot">
        <svg viewBox="0 0 440 14" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="440" height="14" fill="url(#dt)"/>
        </svg>
      </div>

      <div class="tagline">
        Our <strong>Engagement</strong> invitation is just for you
      </div>
    </div>
  </div>

  <!-- BOTTOM QUOTE -->
  <div class="bottom-quote">
    <p>"We are so glad to invite you to celebrate our<br>
    <strong>Engagement Party</strong> and share this special day with us"</p>
  </div>

</div>

// ── COUNTDOWN ──
function tick() {
  const target = new Date('2026-04-02T16:00:00');
  const now = new Date();
  let diff = Math.max(0, target - now);
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const pad = n => String(n).padStart(2,'0');
  const set = (id, val) => {
    const el = document.getElementById(id);
    const v = pad(val);
    if (el.textContent !== v) {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'cdFlip 0.35s ease';
      el.textContent = v;
    }
  };
  set('cd-d', d); set('cd-h', h); set('cd-m', m); set('cd-s', s);
}
tick(); setInterval(tick, 1000);

// ── PETALS ──
const canvas = document.getElementById('petals');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);
const petals = [];
function mkP(){
  return { x: Math.random()*canvas.width, y: -30,
           size: 3+Math.random()*7, speed: 0.35+Math.random()*0.6,
           drift: (Math.random()-.5)*.5, rot: Math.random()*Math.PI*2,
           rs: (Math.random()-.5)*.035, op: .12+Math.random()*.3,
           hue: Math.random()>.5 ? '#c9a84c' : '#8b1a1a', w: Math.random()*Math.PI*2 };
}
for(let i=0;i<20;i++){ const p=mkP(); p.y=Math.random()*canvas.height; petals.push(p); }
(function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  petals.forEach(p=>{
    p.y+=p.speed; p.w+=.02; p.x+=p.drift+Math.sin(p.w)*.35; p.rot+=p.rs;
    if(p.y>canvas.height+30) Object.assign(p,mkP());
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.globalAlpha=p.op;
    ctx.beginPath(); ctx.ellipse(0,0,p.size*.45,p.size,0,0,Math.PI*2);
    ctx.fillStyle=p.hue; ctx.fill(); ctx.restore();
  });
  requestAnimationFrame(animate);
})();
</script>
