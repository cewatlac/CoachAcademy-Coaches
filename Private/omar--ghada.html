<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omar & Ghada — Engagement</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --offwhite: #faf7f2;
    --dark: #1c1208;
    --sepia: #3d2b1f;
    --red: #8b1a1a;
    --gold: #a0722a;
    --mid: #5a3e28;
  }
  html, body { width: 100%; min-height: 100vh; overflow-x: hidden; background: var(--offwhite); }

  /* GRAIN */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 900; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    opacity: 0.4; mix-blend-mode: multiply;
  }

  /* PETALS */
  #petals { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* HERO BG - photo light */
  .hero-bg {
    position: fixed; inset: 0; z-index: 1;
    background-image: var(--photo-bg);
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    filter: brightness(1.05) contrast(0.95);
  }
  /* Very light warm overlay - almost transparent */
  .hero-overlay {
    position: fixed; inset: 0; z-index: 2;
    background: linear-gradient(
      to bottom,
      rgba(250,247,242,0.08) 0%,
      rgba(250,247,242,0.05) 45%,
      rgba(250,247,242,0.3) 75%,
      rgba(250,247,242,0.65) 100%
    );
  }

  /* PULSE RINGS - dark */
  .pulse-ring {
    position: fixed; width: 340px; height: 340px;
    border: 1px solid rgba(139,26,26,0.08);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    animation: pulse 5s ease-out infinite;
    pointer-events: none; z-index: 3;
  }
  .pulse-ring:nth-child(2) { animation-delay: 1.7s; }
  .pulse-ring:nth-child(3) { animation-delay: 3.4s; }

  /* PAGE */
  .page {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 16px 64px;
  }

  /* NAMES */
  .names-wrap {
    text-align: center;
    margin-bottom: 6px;
    opacity: 0; animation: fadeDown 1.4s ease 0.4s forwards;
  }
  .name-script {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(90px, 20vw, 150px);
    line-height: 1;
    display: block;
    color: var(--red);
    text-shadow: 1px 2px 12px rgba(139,26,26,0.2);
    letter-spacing: 2px;
  }
  .name-script.n1 { animation: float 6s ease-in-out 2s infinite; }
  .name-script.n2 { animation: float 6s ease-in-out 2.6s infinite; }
  .and-word {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(40px, 9vw, 65px);
    color: var(--red);
    display: block;
    margin: -16px 0;
    text-shadow: 0 0 16px rgba(139,26,26,0.25);
  }

  /* DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 12px;
    width: min(380px, 88%);
    margin: 22px auto;
    opacity: 0; animation: fadeUp 1.2s ease 1s forwards;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .divider-diamond {
    width: 7px; height: 7px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 8px rgba(160,114,42,0.4);
  }

  /* CARD */
  .lace-card {
    position: relative;
    width: min(520px, 95%);
    opacity: 0; animation: fadeUp 1.4s ease 1.2s forwards;
  }
  .lace-corner {
    position: absolute; width: 40px; height: 40px;
    border-color: rgba(160,114,42,0.5); border-style: solid;
  }
  .lace-corner.tl { top: -18px; left: -18px; border-width: 2px 0 0 2px; }
  .lace-corner.tr { top: -18px; right: -18px; border-width: 2px 2px 0 0; }
  .lace-corner.bl { bottom: -18px; left: -18px; border-width: 0 0 2px 2px; }
  .lace-corner.br { bottom: -18px; right: -18px; border-width: 0 2px 2px 0; }

  /* DENTAL BORDER */
  .dental-top, .dental-bot { width: 100%; height: 14px; display: block; overflow: hidden; }
  .dental-top svg, .dental-bot svg { width: 100%; height: 100%; }

  .card-inner {
    background: rgba(250, 246, 240, 0.82);
    border: 1px solid rgba(160,114,42,0.25);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 26px 38px 30px;
    text-align: center;
    position: relative;
  }
  .card-inner::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(160,114,42,0.05), transparent 60%);
    pointer-events: none;
  }

  /* VENUE */
  .venue {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(13px, 3.2vw, 16px);
    color: var(--mid);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 2;
    margin: 8px 0 16px;
  }
  .venue a {
    color: var(--red);
    text-decoration: none;
    letter-spacing: 2px;
    font-size: clamp(11px, 2.6vw, 13px);
    display: block;
    margin-top: 4px;
    opacity: 0.8;
  }
  .venue a:hover { opacity: 1; text-decoration: underline; }

  /* DATE */
  .date-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(15px, 3.8vw, 20px);
    color: var(--gold);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .date-year-top {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(17px, 4.2vw, 22px);
    color: var(--mid);
    letter-spacing: 8px;
    font-weight: 400;
    opacity: 0.65;
    margin-bottom: 2px;
  }
  .date-big {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(42px, 11vw, 64px);
    color: var(--dark);
    letter-spacing: 10px;
    font-weight: 700;
    text-shadow: 1px 2px 8px rgba(28,12,8,0.1);
    line-height: 1.1;
  }

  /* TIME + COUNTDOWN */
  .time-countdown-row {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin: 14px 0 18px;
  }
  .time-badge {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(15px, 4vw, 20px);
    color: var(--mid);
    letter-spacing: 4px;
    white-space: nowrap;
  }
  .sep-pipe { color: var(--red); opacity: 0.5; font-size: 18px; }
  .countdown-inline {
    display: flex; align-items: center;
    gap: 4px; flex-wrap: wrap; justify-content: center;
  }
  .cd-unit-wrap { display: flex; flex-direction: column; align-items: center; }
  .cd-num-sm {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(20px, 5.5vw, 28px);
    font-weight: 700;
    color: var(--dark);
    background: rgba(139,26,26,0.08);
    border: 1px solid rgba(139,26,26,0.2);
    padding: 2px 8px;
    min-width: 38px;
    text-align: center;
  }
  .cd-lbl-sm {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 3px;
  }
  .cd-colon {
    font-family: 'Courier Prime', monospace;
    font-size: 22px;
    color: var(--red);
    opacity: 0.45;
    margin-bottom: 10px;
    animation: blink 1s step-end infinite;
  }

  /* TAGLINE */
  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(13px, 3.3vw, 16px);
    color: var(--sepia);
    opacity: 0.7;
    line-height: 1.9;
    border-top: 1px solid rgba(160,114,42,0.2);
    padding-top: 16px;
    margin-top: 2px;
  }
  .tagline strong { color: var(--red); font-style: normal; font-weight: 700; }

  /* BOTTOM QUOTE */
  .bottom-quote {
    max-width: 480px;
    text-align: center;
    margin-top: 38px;
    opacity: 0; animation: fadeUp 1.4s ease 2s forwards;
    padding: 0 8px;
  }
  .bottom-quote p {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(10px, 2.5vw, 13px);
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--sepia);
    opacity: 0.55;
    line-height: 2.2;
  }
  .bottom-quote strong { color: var(--mid); font-weight: 700; }

  /* KEYFRAMES */
  @keyframes fadeDown { from{opacity:0;transform:translateY(-28px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(28px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes pulse    { 0%{transform:translate(-50%,-50%) scale(0);opacity:0.4} 100%{transform:translate(-50%,-50%) scale(4.5);opacity:0} }
  @keyframes float    { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-10px) rotate(2deg)} }
  @keyframes blink    { 0%,100%{opacity:0.45} 50%{opacity:0} }
  @keyframes cdFlip   { 0%{transform:rotateX(-90deg);opacity:0} 100%{transform:rotateX(0);opacity:1} }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .page { padding: 24px 10px 48px; }
    .card-inner { padding: 18px 16px 22px; }
    .lace-card { width: 96%; }
    .time-countdown-row { gap: 5px; flex-direction: column; }
    .time-badge { font-size: 14px; letter-spacing: 2px; }
    .cd-num-sm { min-width: 32px; font-size: 18px; padding: 2px 6px; }
    .cd-lbl-sm { font-size: 8px; }
    .venue { font-size: 11px; letter-spacing: 2px; }
    .cd-colon { font-size: 16px; }
    .sep-pipe { display: none; }
  }
  @media (max-width: 380px) {
    .time-badge { font-size: 12px; }
    .cd-num-sm { font-size: 15px; min-width: 28px; }
  }
  /* ── TABLET ── */
  @media (min-width: 481px) and (max-width: 900px) {
    .lace-card { width: min(500px, 90%); }
    .card-inner { padding: 22px 34px 26px; }
  }
  /* ── LAPTOP / DESKTOP ── */
  @media (min-width: 901px) {
    .lace-card { width: 540px; }
    .card-inner { padding: 30px 50px 34px; }
    .page { padding: 52px 24px 80px; }
  }
</style>
</head>

  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const pad = n => String(n).padStart(2,'0');
  const set = (id, val) => {
    const el = document.getElementById(id);
    const v = pad(val);
    if (el.textContent !== v) {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'cdFlip 0.35s ease';
      el.textContent = v;
    }
  };
  set('cd-d', d); set('cd-h', h); set('cd-m', m); set('cd-s', s);
}
tick(); setInterval(tick, 1000);

const canvas = document.getElementById('petals');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);
const petals = [];
function mkP(){
  return { x: Math.random()*canvas.width, y: -30,
           size: 3+Math.random()*7, speed: 0.3+Math.random()*0.55,
           drift: (Math.random()-.5)*.45, rot: Math.random()*Math.PI*2,
           rs: (Math.random()-.5)*.03, op: .08+Math.random()*.22,
           hue: Math.random()>.5 ? 'rgba(160,114,42,0.6)' : 'rgba(139,26,26,0.5)',
           w: Math.random()*Math.PI*2 };
}
for(let i=0;i<18;i++){ const p=mkP(); p.y=Math.random()*canvas.height; petals.push(p); }
(function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  petals.forEach(p=>{
    p.y+=p.speed; p.w+=.02; p.x+=p.drift+Math.sin(p.w)*.3; p.rot+=p.rs;
    if(p.y>canvas.height+30) Object.assign(p,mkP());
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.globalAlpha=p.op;
    ctx.beginPath(); ctx.ellipse(0,0,p.size*.45,p.size,0,0,Math.PI*2);
    ctx.fillStyle=p.hue; ctx.fill(); ctx.restore();
  });
  requestAnimationFrame(animate);
})();
</script>
